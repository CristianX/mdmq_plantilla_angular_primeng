<mat-card class="siem-card mb-25 border-radius bg-white d-block">

  <mat-card-content>

    <div class="row">

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Número de predio</mat-label>
          <input matInput [value]="data?.numeroPredio" readonly>
        </mat-form-field>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Clave Catastral</mat-label>
          <input matInput [value]="data?.claveCatastral" readonly>
        </mat-form-field>
      </div>

    </div>

    <div class="row">

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Administración Zonal</mat-label>
          <input matInput [value]="data?.predioAdminZonal" readonly>
        </mat-form-field>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Parroquia</mat-label>
          <input matInput [value]="data?.predioParrroquia" readonly>
        </mat-form-field>
      </div>

    </div>

    <div class="row">

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Barrio / Sector</mat-label>
          <input matInput [value]="data?.predioBarrioSector" readonly>
        </mat-form-field>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Nomenclatura</mat-label>
          <input matInput [value]="data?.predioNomenclatura" readonly>
        </mat-form-field>
      </div>

    </div>

    <div class="row">

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Calle principal</mat-label>
          <input matInput [value]="data?.predioCallePrincipal" readonly>
        </mat-form-field>
      </div>

      <div class="col-lg-6 col-md-6 col-sm-12">
        <mat-form-field class="mb-5">
          <mat-label>Calle secundaria</mat-label>
          <input matInput [value]="data?.predioCalleSecundaria" readonly>
        </mat-form-field>
      </div>

    </div>

  </mat-card-content>

</mat-card>
