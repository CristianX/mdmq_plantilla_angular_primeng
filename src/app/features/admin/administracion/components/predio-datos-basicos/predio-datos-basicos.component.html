<mat-card class="siem-card border-radius bg-white d-block custom-shadow">

  <mat-card-content class="p-24">
    <div class="section-container">
      <h3 class="section-subtitle">IDENTIFICACIÓN</h3>
      <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Número de predio</mat-label>
            <input matInput [value]="data?.numeroPredio" readonly>
            <mat-icon matPrefix>tag</mat-icon>
          </mat-form-field>
        </div>
        <div class="col-lg-6 col-md-6 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Clave Catastral</mat-label>
            <input matInput [value]="data?.claveCatastral" readonly>
            <mat-icon matPrefix>fingerprint</mat-icon>
          </mat-form-field>
        </div>
      </div>
    </div>

    <div class="section-container">
      <h3 class="section-subtitle">UBICACIÓN ADMINISTRATIVA</h3>
      <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Administración Zonal</mat-label>
            <input matInput [value]="data?.predioAdminZonal" readonly>
            <mat-icon matPrefix>account_balance</mat-icon>
          </mat-form-field>
        </div>
        <div class="col-lg-6 col-md-6 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Parroquia</mat-label>
            <input matInput [value]="data?.predioParrroquia" readonly>
            <mat-icon matPrefix>map</mat-icon>
          </mat-form-field>
        </div>
      </div>
    </div>

    <div class="section-container">
      <h3 class="section-subtitle">DIRECCIÓN Y REFERENCIAS</h3>
      <div class="row">
        <div class="col-lg-4 col-md-4 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Barrio / Sector</mat-label>
            <input matInput [value]="data?.predioBarrioSector" readonly>
            <mat-icon matPrefix>home</mat-icon>
          </mat-form-field>
        </div>
        <div class="col-lg-4 col-md-4 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Nomenclatura</mat-label>
            <input matInput [value]="data?.predioNomenclatura" readonly>
            <mat-icon matPrefix>tag</mat-icon>
          </mat-form-field>
        </div>
        <div class="col-lg-4 col-md-4 col-sm-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Calle principal</mat-label>
            <input matInput [value]="data?.predioCallePrincipal" readonly>
            <mat-icon matPrefix>edit_road</mat-icon>
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Calle secundaria</mat-label>
            <input matInput [value]="data?.predioCalleSecundaria" readonly>
            <mat-icon matPrefix>add_road</mat-icon>
          </mat-form-field>
        </div>
      </div>
    </div>

    
  </mat-card-content>
</mat-card>
