<mat-card class="siem-card mb-25 border-radius bg-white d-block">

  <form [formGroup]="form">

    <div class="row">
      <div class="col-sm-12">

        <mat-form-field class="mb-5" appearance="outline">
          <mat-label>Número de predio</mat-label>

          <input
            matInput
            formControlName="numeroPredio"
            type="text"
            maxlength="10"
          >

          <button
            mat-icon-button
            matSuffix
            color="primary"
            type="button"
            (click)="buscarPredio()"
          >
            <mat-icon>search</mat-icon>
          </button>

          @if (f['numeroPredio'].touched && f['numeroPredio'].invalid) {
            <mat-error>
              {{ f['numeroPredio'].errors?.['required']
                ? 'El número de predio es requerido'
                : 'Máximo 10 caracteres' }}
            </mat-error>
          }

        </mat-form-field>

      </div>
    </div>

  </form>

</mat-card>
